<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Lista de Tareas - DAW</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>📝 TaskMaster</h1>
        <p>Tu gestor de tareas profesional</p>
    </header>

    <!-- ASIDE: Barra lateral -->
    <aside>
        <nav>
            <h3>Menú</h3>
            <ul>
    <li><a href="#" class="active" data-filter="all">Todas las tareas</a></li>
    <li><a href="#" data-filter="high">Alta prioridad</a></li>
    <li><a href="#" data-filter="medium">Media prioridad</a></li>
    <li><a href="#" data-filter="low">Baja prioridad</a></li>
    <li><a href="#" data-filter="completed">Completadas</a></li>
            </ul>
            <div class="stats">
                <h4>Estadísticas</h4>
                <p>Total: <span id="total">0</span></p>
                <p>Completadas: <span id="done">0</span></p>
            </div>
        </nav>
    </aside>

    <!-- MAIN -->
    <main>

        <!-- FORMULARIO PARA AÑADIR TAREAS -->
        <section class="add-task-form">
            <h2>➕ Nueva Tarea</h2>
            <form id="taskForm">
                <input
                    type="text"
                    id="taskInput"
                    placeholder="Escribe una nueva tarea..."
                    required
                />
                <select id="prioritySelect">
                    <option value="high">🔴 Alta prioridad</option>
                    <option value="medium" selected>🟡 Media prioridad</option>
                    <option value="low">🟢 Baja prioridad</option>
                </select>
                <button type="submit">Añadir Tarea</button>
            </form>

            <!-- BONUS: Buscador -->
            <input
                type="text"
                id="searchInput"
                placeholder="🔍 Buscar tareas..."
            />
        </section>

        <!-- LISTA DE TAREAS -->
        <section class="task-list">
            <h2>Mis Tareas</h2>
            <div id="taskList"></div>
        </section>

    </main>

    <script src="js/app.js"></script>

</body>
</html>
